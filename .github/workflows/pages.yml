name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # Root-level pages and SEO files
          cp index.html _site/index.html
          cp robots.txt _site/robots.txt
          cp sitemap.xml _site/sitemap.xml
          cp llms.txt _site/llms.txt
          touch _site/.nojekyll
          # Book content (exclude Claude project files)
          rsync -a --exclude='.claude' books/ _site/books/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
