name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Generate PDF
        run: |
          python3 books/from-box-to-cluster/build-print.py
          google-chrome --headless=new --disable-gpu --no-sandbox \
            --print-to-pdf="books/from-box-to-cluster/dist/Ebook_From_Box_to_Cluster.pdf" \
            --virtual-time-budget=10000 \
            "file://$(pwd)/books/from-box-to-cluster/dist/print.html"

      - name: Assemble site
        run: |
          mkdir -p _site
          # Root-level pages and SEO files
          cp index.html _site/index.html
          cp robots.txt _site/robots.txt
          cp sitemap.xml _site/sitemap.xml
          cp llms.txt _site/llms.txt
          touch _site/.nojekyll
          # Book content (exclude Claude project files)
          rsync -a --exclude='.claude' books/ _site/books/

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
